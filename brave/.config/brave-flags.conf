--force-dark-mode
--enable-gpu-rasterization
--enable-features=UseOzonePlatform,WaylandWindowDecorations,WebUIDarkMode,WebRTCPipeWireCapturer,AcceleratedVideoDecodeLinuxGL,AcceleratedVideoEncoder,CanvasOopRasterization,PlatformHEVCDecoderSupport
# --disable-gpu-compositing
--enable-gpu-compositing
--ozone-platform-hint=auto
--ozone-platform=wayland
# Rendering uses GL/ANGLE on every machine; Chromium's unused Vulkan backend
# only contributes the device probe that loads the NVIDIA ICD and pins the
# dGPU awake on hybrid laptops.
--disable-features=Vulkan
