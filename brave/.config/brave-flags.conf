--force-dark-mode
--ignore-gpu-blocklist
--disable-gpu-driver-bug-workarounds
--enable-gpu-rasterization
--enable-zero-copy
--enable-features=UseOzonePlatform,WaylandWindowDecorations,WebUIDarkMode,WebRTCPipeWireCapturer,AcceleratedVideoDecodeLinuxGL,AcceleratedVideoEncoder,VaapiOnNvidiaGPUs,VaapiIgnoreDriverChecks,CanvasOopRasterization,PlatformHEVCDecoderSupport
# --disable-gpu-compositing
--enable-gpu-compositing
--ozone-platform-hint=auto
--ozone-platform=wayland
