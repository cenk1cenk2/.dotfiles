---
# https://taskfile.dev

version: "3"

env: {}

vars:
  to: "~"
  args: ""
  sudo: false
  verbosity: '{{ repeat (.LOG_LEVEL | default 1 | int) "v" }}'

tasks:
  plan:
    label: "plan: {{ .to }} -> {{ .CLI_ARGS }}"
    desc: Plan to target.
    cmds:
      - stow --no-folding -n{{ .verbosity }}t {{ .to }} {{ .packages }} {{ .CLI_ARGS }}

  deploy:
    desc: Deploy to a target.
    label: "deploy: {{ .to }} -> {{ .CLI_ARGS }}"
    cmds:
      # - task: plan
      #   vars:
      #     CLI_ARGS: '{{ .CLI_ARGS }}'
      #     to: '{{ .to }}'
      - "{{ if .sudo }}sudo {{ end }}stow {{ .args }} --no-folding -{{ .verbosity }}t {{ .to }} {{ .packages }} {{ .CLI_ARGS }}"
    status:
      - '{{ .status | default "false" }}'

  undeploy:
    label: "undeploy: {{ .to }} -> {{ .CLI_ARGS }}"
    desc: Remove a stowed target.
    cmds:
      - stow {{ .args }} -{{ .verbosity }}t {{ .to }} -D {{ .packages }} {{ .CLI_ARGS }}
    status:
      - '{{ .status | default "false" }}'

  deploy:run:
    desc: Deploys to all targets
    deps:
      - task: deploy:linux
      - task: deploy:macos

  wayland-scripts:bootstrap:
    desc: >-
      Provision the uv venv at the stow destination so `uv run` from
      the wayland scripts' shebangs finds a prepared env. `pyproject.toml`
      and `uv.lock` are symlinked from this repo (via the `wayland` stow
      package) so dependency changes still commit through git; only the
      generated `.venv/` stays local to the target machine.
    dir: "{{ .HOME }}/.config/wayland/scripts"
    cmds:
      # Refuse to run before `task deploy:linux` has stowed the
      # pyproject.toml into place — bootstrapping against a missing
      # symlink would create an empty project at the destination and
      # diverge it from the dotfiles copy.
      - |
        if [ ! -L pyproject.toml ]; then
          echo "wayland/scripts not stowed yet — run \`task deploy:linux\` first" >&2
          exit 1
        fi
      # `--python /usr/bin/python3` pins to the distro interpreter so
      # the venv's site-packages overlay sees pacman's python-gobject;
      # `--system-site-packages` turns that overlay on so PyGObject is
      # inherited from the system install instead of compiled from the
      # PyPI sdist on every bootstrap. `uv sync` afterwards layers the
      # pure-Python deps from pyproject.toml on top without disturbing
      # the system-package passthrough and updates `uv.lock` through
      # the stow symlink so the change lands back in the dotfiles repo.
      #
      # Idempotent: if the existing venv already has
      # `include-system-site-packages = true`, keep it and just sync.
      # Otherwise rebuild from scratch — `uv run` races a venv creation
      # without the flag on first shebang invocation (see issue #5737),
      # so stale venvs need resetting rather than updating in place.
      - |
        if [ -f .venv/pyvenv.cfg ] && grep -q '^include-system-site-packages = true' .venv/pyvenv.cfg; then
          echo "venv already has system-site-packages; skipping recreate"
        else
          uv venv --clear --python /usr/bin/python3 --system-site-packages
        fi
      - uv sync

  deploy:linux:
    desc: Deploy to target.
    platforms:
      - linux
    cmds:
      - task: deploy
        vars:
          to: "~"
          packages: >-
            autotiling-rs
            brave
            claude
            clipse
            dbus
            desktop
            dex
            easyeffects
            electron
            fonts
            gitconfig
            gnupg
            hyprland
            hyprwhspr
            input-remapper
            kanshi
            khal
            kitty
            mako
            mimetypes
            mpv
            neomutt
            obsbot
            pacman
            pipewire
            rofi
            scripts
            ssh-config
            swappy
            sway
            swayimg
            swaylock
            swaync
            swayosd
            swayr
            sworkstyle
            waybar
            wayland
            wiremix
            wireplumber
            wl-gamma-relay-rs
            wlogout
            xauthority
            xdg-desktop-portal
            xdg-desktop-portal-termfilechooser
          # args: --adopt
      # HACK: little trick to change the configuration for nvidia
      # - task: deploy
      #   vars:
      #     to: "~"
      #     packages: brave electron
      #     # status: '! [[ "$LIBVA_DRIVER_NAME" != "nvidia" ]]'
      #     status: test -d /usr/lib/nvidia
      # - task: deploy
      #   vars:
      #     to: "~"
      #     packages: brave-nvidia electron-nvidia
      #     # status: '! [[ "$LIBVA_DRIVER_NAME" == "nvidia" ]]'
      #     status: test ! -d /usr/lib/nvidia
      # HACK: little trick to change the configuration for nvidia
      - task: deploy
        vars:
          sudo: true
          to: "/"
          packages: rootfs
          # args: --adopt
      # TODO: remove after deploying to all instances
      - task: undeploy
        vars:
          to: "~"
          packages: >-
            chrome
          # args: --adopt

  deploy:macos:
    desc: Deploy to target.
    platforms:
      - darwin
    cmds:
      - task: deploy
        vars:
          to: "~"
          packages: >-
            brave
            gitconfig
            yabai
            janky-borders
            kitty

  deploy:gaming:
    desc: Deploy to target.
    platforms:
      - linux
    cmds:
      - task: deploy
        vars:
          to: "~"
          packages: >-
            mangohud
          args: --adopt
