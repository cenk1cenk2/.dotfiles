# OBSBOT Control Configuration
# Auto-generated settings file
#
# Boolean values: true/false or enabled/disabled
# FOV values: wide/medium/narrow or 0/1/2
# Numeric ranges: zoom (1.0-2.0), pan/tilt (-1.0 to 1.0)

# Enable automatic face tracking
face_tracking=disabled

# High Dynamic Range
hdr=enabled

# Field of View (wide/medium/narrow)
fov=narrow

# Face-based Auto Exposure
face_ae=enabled

# Face-based Auto Focus
face_focus=enabled

# Zoom level (1.0 to 2.0)
zoom=1

# Pan position (-1.0 to 1.0, 0 is center)
pan=0

# Tilt position (-1.0 to 1.0, 0 is center)
tilt=0

# AI Tracking Mode (0=None,1=Group,2=Human,3=Hand,4=Whiteboard,5=Desk)
ai_mode=0

# AI Human Sub-Mode (0=Normal,1=UpperBody,2=CloseUp,3=Headless,4=LowerBody)
ai_sub_mode=0

# Enable AI Auto Zoom
auto_zoom=disabled

# Tracking Speed (0=Lazy,1=Slow,2=Standard,3=Fast,4=Crazy,5=Auto)
track_speed=0

# Brightness Auto Mode (when enabled, brightness slider is read-only)
brightness_auto=enabled
# Brightness (0-255, default 128)
brightness=50

# Contrast Auto Mode (when enabled, contrast slider is read-only)
contrast_auto=enabled
# Contrast (0-255, default 128)
contrast=50

# Saturation Auto Mode (when enabled, saturation slider is read-only)
saturation_auto=enabled
# Saturation (0-255, default 128)
saturation=50

# White Balance (auto/daylight/fluorescent/tungsten/flash/fine/cloudy/shade)
white_balance=auto
# Manual white balance temperature (Kelvin, only used when white_balance=manual)
white_balance_kelvin=5000

# PTZ Preset 1
preset1_defined=disabled
preset1_pan=0
preset1_tilt=0
preset1_zoom=1

# PTZ Preset 2
preset2_defined=disabled
preset2_pan=0
preset2_tilt=0
preset2_zoom=1

# PTZ Preset 3
preset3_defined=disabled
preset3_pan=0
preset3_tilt=0
preset3_zoom=1

# Audio auto gain control
audio_auto_gain=enabled

# Preferred preview format (auto or WIDTHxHEIGHT@FPS)
preview_format=1920x1080@60

# Application Settings
# Start application minimized to system tray
start_minimized=disabled

# Virtual camera output
virtual_camera_enabled=enabled
virtual_camera_device=/dev/video42
# Set 'match' to follow the preview output, or WIDTHxHEIGHT (e.g. 1280x720)
virtual_camera_resolution=match

# Snapshot save directory (empty = ~/Pictures/obsbot-control/)
snapshot_directory=
