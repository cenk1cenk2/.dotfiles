[Unit]
# Tray-using XDG autostart apps race waybar's StatusNotifierWatcher
# without this. `hyprland-session.service` Wants= both
# hyprland-session.target and xdg-desktop-autostart.target with no
# ordering, so waybar and the app-*@autostart.service units start in
# parallel.
After=waybar@hyprland.service
