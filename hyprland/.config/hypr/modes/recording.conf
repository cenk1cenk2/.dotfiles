# vim:ft=hyprlang

### Recording Mode

bind = $mod, R, submap, ůįēß Recording: (r) toggle | (p) pause | (o) OBS | (s/S) speech‚Üítype | (c/C) speech‚Üíclipboard | (w) copywriter | (z) zoom | (q/Q) stop recording/speech | ESC

submap = ůįēß Recording: (r) toggle | (p) pause | (o) OBS | (s/S) speech‚Üítype | (c/C) speech‚Üíclipboard | (w) copywriter | (z) zoom | (q/Q) stop recording/speech | ESC

# Toggle recording (start/stop)
bind = , r, exec, $recorder toggle
bind = , r, submap, reset

# Toggle pause/resume
bind = , p, exec, $recorder pause
bind = , p, submap, reset

# Open OBS window
bind = , o, exec, $recorder open
bind = , o, submap, reset

# Stop recording
bind = , q, exec, $recorder stop
bind = , q, submap, reset

# Speech-to-text direct typing with AI enrichment
bind = , s, exec, $speech toggle type --enrich
bind = , s, submap, reset

# Speech-to-text direct typing (raw, no enrichment)
bind = SHIFT, s, exec, $speech toggle type
bind = SHIFT, s, submap, reset

# Speech-to-text to clipboard with AI enrichment
bind = , c, exec, $speech toggle clipboard --enrich
bind = , c, submap, reset

# Speech-to-text to clipboard (raw, no enrichment)
bind = SHIFT, c, exec, $speech toggle clipboard
bind = SHIFT, c, submap, reset

# Copywriter: refine clipboard through AI
bind = , w, exec, $copywriter run clipboard
bind = , w, submap, reset

# Toggle zoom
bind = , z, exec, hypr-zoom -easing=InOutCubic -interp=Linear -target 1.5
bind = , z, submap, reset

# Terminate waystt
bind = SHIFT, q, exec, $speech kill
bind = SHIFT, q, submap, reset

# Exit recording mode
bind = , escape, submap, reset

submap = reset
