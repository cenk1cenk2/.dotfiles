# vim:ft=hyprlang

### Recording Mode

bind = $mod, R, submap, Û∞ïß Recording: (r) toggle | (p) pause | (o) OBS | (s/S) speech‚Üítype | (c/C) speech‚Üíclipboard | (a/A) speech‚Üípilot/hide | (w/W) copywriter/kill | (z) zoom | (q/Q) stop speech/recording | ESC

submap = Û∞ïß Recording: (r) toggle | (p) pause | (o) OBS | (s/S) speech‚Üítype | (c/C) speech‚Üíclipboard | (a/A) speech‚Üípilot/hide | (w/W) copywriter/kill | (z) zoom | (q/Q) stop speech/recording | ESC

# Toggle recording (start/stop)
bind = , r, exec, $recorder toggle
bind = , r, submap, reset

# Toggle pause/resume
bind = , p, exec, $recorder pause
bind = , p, submap, reset

# Open OBS window
bind = , o, exec, $recorder open
bind = , o, submap, reset

# Stop recording
bind = SHIFT, q, exec, $recorder stop
bind = SHIFT, q, submap, reset

# Speech-to-text direct typing with AI enrichment
bind = , s, exec, $speech toggle --output type --enrich
bind = , s, submap, reset

# Speech-to-text direct typing (raw, no enrichment)
bind = SHIFT, s, exec, $speech toggle --output type
bind = SHIFT, s, submap, reset

# Speech-to-text to clipboard with AI enrichment
bind = , c, exec, $speech toggle --output clipboard --enrich
bind = , c, submap, reset

# Speech-to-text to clipboard (raw, no enrichment)
bind = SHIFT, c, exec, $speech toggle --output clipboard
bind = SHIFT, c, submap, reset

# Speech-to-text piped into the pilot overlay (new session or live-forward)
bind = , a, exec, zsh -c '~/.config/wayland/scripts/speech.py toggle --output stdout | ~/.config/wayland/scripts/pilot.py toggle --input stdin'
bind = , a, submap, reset

# Toggle the pilot overlay (hides/shows without ending the session)
bind = SHIFT, a, exec, $pilot toggle
bind = SHIFT, a, submap, reset

# Copywriter: refine clipboard through AI
bind = , w, exec, $copywriter run clipboard
bind = , w, submap, reset

# Kill copywriter
bind = SHIFT, w, exec, $copywriter kill
bind = SHIFT, w, submap, reset

# Toggle zoom
bind = , z, exec, hypr-zoom -easing=InOutCubic -interp=Linear -target 1.5
bind = , z, submap, reset

# Stop speech-to-text
bind = , q, exec, $speech kill
bind = , q, submap, reset

# Exit recording mode
bind = , escape, submap, reset

submap = reset
