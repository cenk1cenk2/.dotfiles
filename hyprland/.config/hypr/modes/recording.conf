# vim:ft=hyprlang

### Recording Mode

bind = $mod, R, submap, 󰕧 Recording: (r/R) toggle/pause | (o) OBS | (s/S) speech→type | (c/C) speech→clipboard | (a/A) speech→ask/toggle | (p/P) speech→plan/toggle | (w/W) copywriter/kill | (z) zoom | (q/Q) stop speech/recording | ESC

submap = 󰕧 Recording: (r/R) toggle/pause | (o) OBS | (s/S) speech→type | (c/C) speech→clipboard | (a/A) speech→ask/toggle | (p/P) speech→plan/toggle | (w/W) copywriter/kill | (z) zoom | (q/Q) stop speech/recording | ESC

# Toggle recording (start/stop)
bind = , r, exec, $recorder toggle
bind = , r, submap, reset

# Pause/resume recording — moved off `p` (now the plan-pilot session key)
bind = SHIFT, r, exec, $recorder pause
bind = SHIFT, r, submap, reset

# Open OBS window
bind = , o, exec, $recorder open
bind = , o, submap, reset

# Stop recording
bind = SHIFT, q, exec, $recorder stop
bind = SHIFT, q, submap, reset

# Speech-to-text direct typing with AI enrichment
bind = , s, exec, $speech toggle --output type --enrich
bind = , s, submap, reset

# Speech-to-text direct typing (raw, no enrichment)
bind = SHIFT, s, exec, $speech toggle --output type
bind = SHIFT, s, submap, reset

# Speech-to-text to clipboard with AI enrichment
bind = , c, exec, $speech toggle --output clipboard --enrich
bind = , c, submap, reset

# Speech-to-text to clipboard (raw, no enrichment)
bind = SHIFT, c, exec, $speech toggle --output clipboard
bind = SHIFT, c, submap, reset

# `ask` hyprpilot instance — speech-piped prompt into the
# `personal/claude/opus` profile. Slug `ask` doubles as the
# instance name + the routing key; `prompts send --instance ask`
# auto-spawns under the named profile when no live instance carries
# the `ask` slug, otherwise targets the existing one.
bind = , a, exec, zsh -c '~/.config/wayland/scripts/speech.py toggle --output stdout | hyprpilot ctl prompts send --instance ask --draft --show --profile personal/claude/opus --cwd ~/notes'
bind = , a, submap, reset

# Focus + present the `ask` instance — captain wants to come back
# to the same conversation without re-prompting. `--show` chains
# `overlay/show` so a hidden overlay re-maps in the same beat.
bind = SHIFT, a, exec, hyprpilot ctl instances focus --id ask --show
bind = SHIFT, a, submap, reset

# `plan` hyprpilot instance — speech-piped prompt into the
# `kilic/kimi2.6` profile (opencode + kimi-2.6:cloud, captain's
# planning lane).
bind = , p, exec, zsh -c '~/.config/wayland/scripts/speech.py toggle --output stdout | hyprpilot ctl prompts send --instance plan --draft --show --profile kilic/kimi2.6 --cwd ~/notes'
bind = , p, submap, reset

# Focus + present the `plan` instance — same shape as SHIFT+a.
bind = SHIFT, p, exec, hyprpilot ctl instances focus --id plan --show
bind = SHIFT, p, submap, reset

# Copywriter: refine clipboard through AI
bind = , w, exec, $copywriter run clipboard
bind = , w, submap, reset

# Kill copywriter
bind = SHIFT, w, exec, $copywriter kill
bind = SHIFT, w, submap, reset

# Toggle zoom
bind = , z, exec, hypr-zoom -easing=InOutCubic -interp=Linear -target 1.5
bind = , z, submap, reset

# Stop speech-to-text
bind = , q, exec, $speech kill
bind = , q, submap, reset

# Exit recording mode
bind = , escape, submap, reset

submap = reset
