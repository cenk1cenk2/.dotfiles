# vim:ft=hyprlang

### AI Mode

bind = $mod, O, submap, 󰧑 AI: (O/o) focused/toggle | (I/i) ask/focus | (P/p) plan/focus | (L/l) work/focus | (s/S/c/C) speech | (w/W) copy | (q) stop | ESC

submap = 󰧑 AI: (O/o) focused/toggle | (I/i) ask/focus | (P/p) plan/focus | (L/l) work/focus | (s/S/c/C) speech | (w/W) copy | (q) stop | ESC

# Talk to whatever hyprpilot instance is currently focused. Omitting
# `--instance` makes hyprpilot fall back to the focused pointer; if
# none is live the daemon errors out. Use `I` / `P` / `L` to spawn the
# named lanes.
bind = SHIFT, o, exec, zsh -c '~/.config/wayland/scripts/speech.py toggle --output stdout | hyprpilot ctl prompts send --draft --show'
bind = SHIFT, o, submap, reset

# `ask` hyprpilot instance — speech-piped prompt into the
# `personal/claude/opus` profile. Slug `ask` doubles as the
# instance name + the routing key; `prompts send --instance ask`
# auto-spawns under the named profile when no live instance carries
# the `ask` slug, otherwise targets the existing one.
bind = SHIFT, i, exec, zsh -c '~/.config/wayland/scripts/speech.py toggle --output stdout | hyprpilot ctl prompts send --instance ask --draft --show --profile personal/claude/opus --cwd ~/notes'
bind = SHIFT, i, submap, reset

# Focus + present the `ask` instance — captain wants to come back
# to the same conversation without re-prompting. `--show` chains
# `overlay/show` so a hidden overlay re-maps in the same beat.
bind = , i, exec, hyprpilot ctl instances focus --instance ask --show --ensure --profile personal/claude/opus --cwd ~/notes
bind = , i, submap, reset

# `plan` hyprpilot instance — speech-piped prompt into the
# `kilic/kimi2.6` profile (opencode + kimi-2.6:cloud, captain's
# planning lane).
bind = SHIFT, p, exec, zsh -c '~/.config/wayland/scripts/speech.py toggle --output stdout | hyprpilot ctl prompts send --instance plan --draft --show --profile kilic/kimi2.6 --cwd ~/notes'
bind = SHIFT, p, submap, reset

# Focus + present the `plan` instance — same shape as `i`.
bind = , p, exec, hyprpilot ctl instances focus --instance plan --show --ensure --profile kilic/kimi2.6 --cwd ~/notes
bind = , p, submap, reset

# `work` hyprpilot instance — speech-piped prompt into the
# `work/claude/opus` profile (laravel work lane).
bind = SHIFT, l, exec, zsh -c '~/.config/wayland/scripts/speech.py toggle --output stdout | hyprpilot ctl prompts send --instance work --draft --show --profile work/claude/opus --cwd ~/notes'
bind = SHIFT, l, submap, reset

# Focus + present the `work` instance — same shape as `i` / `p`.
bind = , l, exec, hyprpilot ctl instances focus --instance work --show --ensure --profile work/claude/opus --cwd ~/notes
bind = , l, submap, reset

# Speech-to-text direct typing with AI enrichment
bind = , s, exec, $speech toggle --output type --enrich
bind = , s, submap, reset

# Speech-to-text direct typing (raw, no enrichment)
bind = SHIFT, s, exec, $speech toggle --output type
bind = SHIFT, s, submap, reset

# Speech-to-text to clipboard with AI enrichment
bind = , c, exec, $speech toggle --output clipboard --enrich
bind = , c, submap, reset

# Speech-to-text to clipboard (raw, no enrichment)
bind = SHIFT, c, exec, $speech toggle --output clipboard
bind = SHIFT, c, submap, reset

# Copywriter: refine clipboard through AI
bind = , w, exec, $copywriter run clipboard
bind = , w, submap, reset

# Kill copywriter
bind = SHIFT, w, exec, $copywriter kill
bind = SHIFT, w, submap, reset

# Toggle the hyprpilot overlay (focused instance) — show/hide without
# re-prompting. Webview stays warm across hides.
bind = , o, exec, hyprpilot ctl overlay toggle
bind = , o, submap, reset

# Stop speech-to-text
bind = , q, exec, $speech kill
bind = , q, submap, reset

# Exit AI mode
bind = , escape, submap, reset

submap = reset
