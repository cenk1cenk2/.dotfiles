# vim:ft=hyprlang

### Hyprland Plugins

# Auto-install and load plugins at startup
# exec-once = ~/.config/hypr/scripts/install-plugins.sh
# exec-once = hyprpm reload -n

# hy3 - i3/sway-like tiling layout (DISABLED - using native dwindle layout)
# https://github.com/outfoxxed/hy3

# plugin {
#   hy3 {
#     # disable gaps when only one window is on workspace
#     no_gaps_when_only = 1
#
#     # policy controlling what happens when a node is removed from a group,
#     # leaving only a group
#     # 0 = remove the nested group
#     # 1 = keep the nested group
#     # 2 = keep the nested group only if its parent is a tab group
#     node_collapse_policy = 2
#
#     # tab group settings
#     tabs {
#       # height of the tab bar
#       height = 24
#
#       # padding between the tab bar and its focused node
#       padding = 2
#
#       # tab bar should animate in/out from the top instead of below the window
#       from_top = false
#
#       # rounding of tab bar corners
#       radius = 0
#
#       # render the window title on the bar
#       render_text = true
#
#       # center the window title
#       text_center = true
#
#       # font to render the window title with
#       text_font = $gui-font
#
#       # height of the window title
#       text_height = 12
#
#       # left padding of the window title
#       text_padding = 4
#
#       # active tab bar segment color (matches Sway client.focused border)
#       col.active = $color3
#       col.active.border = $color11
#       col.active.text = $color0
#
#       # urgent tab bar segment color (matches Sway client.urgent)
#       col.urgent = $color1
#       col.active.border = $color9
#       col.urgent.text = $color0
#
#       # inactive tab bar segment color (matches Sway client.focused_inactive)
#       col.inactive = $color8
#       col.active.border = $color0
#       col.inactive.text = $color0
#     }
#
#     # autotiling settings
#     autotile {
#       # enable autotile
#       enable = true
#
#       # make autotile-created groups ephemeral
#       ephemeral_groups = true
#
#       # if a window would be squished smaller than this width, a vertical split will be created
#       # -1 = never automatically split vertically
#       # 0 = always automatically split vertically
#       trigger_width = 800
#
#       # if a window would be squished smaller than this height, a horizontal split will be created
#       # -1 = never automatically split horizontally
#       # 0 = always automatically split horizontally
#       trigger_height = 600
#
#       # a space or comma separated list of workspace ids where autotile should be enabled
#       # it's possible to create an exception rule by prefixing the definition with "not:"
#       # workspaces = 1,2 # autotiling will only be enabled on workspaces 1 and 2
#       # workspaces = not:1,2 # autotiling will be enabled on all workspaces except 1 and 2
#       workspaces = all
#     }
#   }
# }

# hy3 keybinding overrides
# Uncomment below (along with plugin block above) to re-enable hy3.
# These unbind the native dwindle keys and rebind them with hy3 dispatchers.
#
# # Focus movement
# unbind = $mod, h
# unbind = $mod, j
# unbind = $mod, k
# unbind = $mod, l
# bind = $mod, h, hy3:movefocus, l
# bind = $mod, j, hy3:movefocus, d
# bind = $mod, k, hy3:movefocus, u
# bind = $mod, l, hy3:movefocus, r
#
# # Move windows within workspace
# unbind = $mod SHIFT, h
# unbind = $mod SHIFT, j
# unbind = $mod SHIFT, k
# unbind = $mod SHIFT, l
# bind = $mod SHIFT, h, hy3:movewindow, l
# bind = $mod SHIFT, j, hy3:movewindow, d
# bind = $mod SHIFT, k, hy3:movewindow, u
# bind = $mod SHIFT, l, hy3:movewindow, r
#
# # Layout controls
# unbind = $mod, x
# unbind = $mod, v
# unbind = $mod, e
# unbind = $mod, z
# unbind = $mod SHIFT, z
# bind = $mod, x, hy3:makegroup, h, ephemeral
# bind = $mod, v, hy3:makegroup, v, ephemeral
# bind = $mod, e, hy3:changegroup, toggletab
# bind = $mod, z, hy3:expand, expand
# bind = $mod SHIFT, z, hy3:expand, shrink
#
