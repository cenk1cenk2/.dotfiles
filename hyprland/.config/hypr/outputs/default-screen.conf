# vim:ft=hyprlang

### Output configuration

# Default monitor configuration
# kanshi will handle dynamic monitor configuration
monitor = , preferred, auto, 1

# TODO: figure out how we can mess with the ordering of displays
monitor = desc:Sony SONY TV  *30 0x01010101, disable

# 10-bit depth for HDR-capable monitors
# kanshi still manages mode/position/scale, these just set bitdepth
monitor = desc:LG Electronics 38GN950, preferred, auto, 1, bitdepth, 10
monitor = desc:ASUSTek COMPUTER INC VG27A, preferred, auto, 1, bitdepth, 10
monitor = desc:Sony SONY TV  *30, preferred, auto, 1, bitdepth, 10

# Monitor features
monitor = , addreserved, 0, 0, 0, 0
# adaptive_sync is per-monitor, configure in kanshi profiles

render {
    # Auto-switch to HDR when a fullscreen app requests it, back to SDR otherwise
    cm_fs_passthrough = 0
    cm_auto_hdr = 2
}

misc {
    vrr = 2
    vfr = true
}
