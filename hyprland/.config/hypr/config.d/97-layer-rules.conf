# vim:ft=hyprlang

layerrule {
    name = swaync-control-center
    match:namespace = swaync-control-center
    no_screen_share = on
}

layerrule {
    name = swaync-notification-window
    match:namespace = swaync-notification-window
    no_screen_share = on
}

# Ask conversational overlay — translucent sidebar, want the compositor
# to blur content behind it and treat transparent pixels as click-through
# so clicks near the rounded corners don't eat events meant for the
# window underneath.
layerrule = blur, ask
layerrule = ignorealpha 0.1, ask
