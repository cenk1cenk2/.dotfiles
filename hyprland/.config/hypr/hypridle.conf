general {
    lock_cmd = pidof hyprlock || hyprlock
    before_sleep_cmd = loginctl lock-session
    after_sleep_cmd = hyprctl dispatch 'hl.dsp.dpms("on")'
    ignore_dbus_inhibit = false
}

listener {
    timeout = 900
    on-timeout = upower -i $(upower -e | grep battery) | grep -q "state.*discharging" && brightnessctl -s set 10%
    on-resume = brightnessctl -r
}

listener {
    timeout = 1800
    on-timeout = upower -i $(upower -e | grep battery) | grep -q "state.*discharging" && (pidof hyprlock || hyprlock) && playerctl -a pause
}

# Hard stop: pause all media after 1h idle regardless of power state or
# host (blacklisted players like Spotify keep the machine awake otherwise).
listener {
    timeout = 3600
    on-timeout = playerctl -a pause
}

# OLED hosts: fully blank at 5 min idle (charging or not) to spare the
# panel. Gated by hostname regex — add more hosts to the alternation as
# they land. mouse_move/key_press_enables_dpms wake it on input.
listener {
    timeout = 300
    on-timeout = uname -n | grep -qE '^(bat)$' && hyprctl dispatch 'hl.dsp.dpms("off")'
    on-resume = hyprctl dispatch 'hl.dsp.dpms("on")'
}
