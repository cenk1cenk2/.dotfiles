general {
    lock_cmd = pidof hyprlock || hyprlock
    before_sleep_cmd = loginctl lock-session
    after_sleep_cmd = hyprctl dispatch 'hl.dsp.dpms("on")'
    ignore_dbus_inhibit = false
}

listener {
    timeout = 900
    on-timeout = upower -i $(upower -e | grep battery) | grep -q "state.*discharging" && brightnessctl -s set 10%
    on-resume = brightnessctl -r
}

listener {
    timeout = 1800
    on-timeout = upower -i $(upower -e | grep battery) | grep -q "state.*discharging" && (pidof hyprlock || hyprlock)
}

# OLED panels: fully blank at 5 min idle (charging or not) to spare the
# panel. `tdp screen is-oled` owns the detection (sysfs EDID probe).
# mouse_move/key_press_enables_dpms wake it on input.
listener {
    timeout = 300
    on-timeout = tdp screen is-oled && hyprctl dispatch 'hl.dsp.dpms("off")'
    on-resume = hyprctl dispatch 'hl.dsp.dpms("on")'
}
