q = insert
w = scrolllock
e = noop
r = noop
t = noop
y = brightnessup
u = volumedown
i = mute
o = volumeup
p = noop
backspace = noop
a = noop
s = noop
d = noop
f = noop
g = noop
h = brightnessdown
j = previoussong
k = playpause
l = nextsong
