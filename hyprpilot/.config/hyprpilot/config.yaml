---
logging:
  level: error

# Root-level [[patches]] — each entry is a partial ProfileConfig overlay
# folded onto whichever profile is picked at resolve time. Optional
# `$match.profile` glob filters which profiles a patch reaches (globset;
# crosses `/`). Bodies fold via the strategic `$patch` engine
# (`$patch: replace`, keyed-array merge by id, primitive append+dedupe,
# `$deleteFromPrimitiveList/<field>`).
patches:
  # Unscoped — every profile inherits the shared cwd, system_prompt and
  # default mcp/skills config.
  - system_prompt:
      - file: ~/.config/nvim/utils/agents/AGENTS.md
    mcp:
      enabled: true
      autoAcceptTools:
        - "*"
      autoRejectTools: []

  # personal/* + kilic/* profiles share one mcps/skills ignore list.
  - $match:
      profile: "personal/*"
    mcp:
      skills:
        - dir: ~/.config/nvim/utils/agents/skills/
          ignore:
            - "*-laravel"
            - "*-laravel-*"
            - notion-*
            - spacelift-*
    mcps:
      - file: ~/.config/nvim/utils/mcphub/servers.json
        ignore:
          - "*-laravel"
          - aws-docs
          - terraform

  # work/* profiles use a different ignore set (gitlab + playwright
  # excluded; aws-docs allowed).
  - $match:
      profile: "work/*"
    mcp:
      skills:
        - dir: ~/.config/nvim/utils/agents/skills/
          ignore:
            - "*-kilic-*"
            - "*-kilic"
            - gitlab-*
    mcps:
      - file: ~/.config/nvim/utils/mcphub/servers.json
        ignore:
          - "*-kilic"
          - gitlab
          - playwright

  # Work Claude profiles point CLAUDE_CONFIG_DIR at the work config dir.
  - $match:
      profile: "work/claude/*"
    env:
      "$patch": replace
      CLAUDE_CONFIG_DIR: "${HOME}/.claude-laravel"

  - $match:
      profile: "personal/claude/*"
    env:
      "$patch": replace
      CLAUDE_CONFIG_DIR: "${HOME}/.claude-kilic"

# [[agents]] — vendor registry. `command`/`args` are the NATIVE vendor
# CLI the launcher exec()s directly (no ACP bridge, no nested `spawn`).
# claude-code is inherited from the built-in defaults; these two override
# codex/opencode with the native flags you want.
agents:
  - id: codex
    provider: codex
    command: codex
    args:
      - "--profile"
      - "default"
  - id: opencode
    provider: opencode
    command: opencode
    args:
      - "--auto"

profile:
  default: personal/claude/opus

profiles:
  - id: personal/claude/fable
    agent: claude-code
    model: "claude-fable-5[1m]"
    mode: auto
    env:
      CLAUDE_CODE_OAUTH_TOKEN: "${NVIM_CLAUDE_ACP_KILIC}"

  - id: personal/claude/opus
    agent: claude-code
    model: "opus[1m]"
    mode: auto
    env:
      CLAUDE_CODE_OAUTH_TOKEN: "${NVIM_CLAUDE_ACP_KILIC}"

  - id: personal/claude/sonnet
    agent: claude-code
    model: "sonnet"
    mode: auto
    env:
      CLAUDE_CODE_OAUTH_TOKEN: "${NVIM_CLAUDE_ACP_KILIC}"

  - id: personal/claude/haiku
    agent: claude-code
    model: "haiku"
    mode: auto
    env:
      CLAUDE_CODE_OAUTH_TOKEN: "${NVIM_CLAUDE_ACP_KILIC}"

  - id: personal/kilic/deepseek-v4-pro:cloud
    agent: opencode
    model: kilic/deepseek-v4-pro:cloud
    mode: build
    env:
      AI_KILIC_DEV_API_KEY: "${AI_KILIC_DEV_API_KEY}"

  - id: personal/kilic/glm-5.2:cloud
    agent: opencode
    model: kilic/glm-5.2:cloud
    mode: build
    env:
      AI_KILIC_DEV_API_KEY: "${AI_KILIC_DEV_API_KEY}"

  - id: personal/kilic/minimax-m3
    agent: opencode
    model: kilic/minimax-m3:cloud
    mode: build
    env:
      AI_KILIC_DEV_API_KEY: "${AI_KILIC_DEV_API_KEY}"

  - id: personal/kilic/kimi-k2.7-code:cloud
    agent: opencode
    model: kilic/kimi-k2.7-code:cloud
    mode: build
    env:
      AI_KILIC_DEV_API_KEY: "${AI_KILIC_DEV_API_KEY}"

  - id: personal/kilic/gemma4:31b-cloud
    agent: opencode
    model: kilic/gemma4:31b-cloud
    mode: build
    env:
      AI_KILIC_DEV_API_KEY: "${AI_KILIC_DEV_API_KEY}"

  - id: personal/codex/gpt-5.5
    agent: codex
    model: gpt-5.5
    mode: read-only

  - id: personal/codex/gpt-5.3-codex-spark
    agent: codex
    model: gpt-5.3-codex-spark
    mode: read-only

  - id: work/claude/fable
    agent: claude-code
    model: "claude-fable-5[1m]"
    mode: auto
    env:
      CLAUDE_CODE_OAUTH_TOKEN: "${NVIM_CLAUDE_ACP_WORK}"

  - id: work/claude/opus
    agent: claude-code
    model: "opus[1m]"
    mode: auto
    env:
      CLAUDE_CODE_OAUTH_TOKEN: "${NVIM_CLAUDE_ACP_WORK}"

  - id: work/claude/sonnet
    agent: claude-code
    model: "sonnet[1m]"
    mode: auto
    env:
      CLAUDE_CODE_OAUTH_TOKEN: "${NVIM_CLAUDE_ACP_WORK}"

  - id: work/claude/haiku
    agent: claude-code
    model: haiku
    mode: auto
    env:
      CLAUDE_CODE_OAUTH_TOKEN: "${NVIM_CLAUDE_ACP_WORK}"
    system_prompt: []
