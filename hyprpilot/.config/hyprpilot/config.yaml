cwd: ~/notes

remote:
  enabled: true

ui:
  zoom: 1.4

daemon:
  window:
    mode: anchor
    anchor:
      edge: right
      margin: 0
      width: 40%

autostart:
  # TODO: fix this later on when installed via aur
  enabled: false

logging:
  level: info

agent:
  default: claude-code

profile:
  default: personal/claude/opus

profiles:
  - id: personal/claude/opus
    agent: claude-code
    model: "opus[1m]"
    mode: plan
    system_prompt:
      - file: ~/.config/nvim/utils/agents/AGENTS.md
        inject:
          on_create: true
          on_update: true
      - file: ~/.config/nvim/utils/agents/HYPRPILOT.md
        inject:
          on_create: true
          on_update: true
    mcps:
      - file: ~/.config/nvim/utils/mcphub/servers.json
        ignore:
          - "*-kilic"
          - "*-kilic-*"
          - "*-laravel"
          - aws-docs
    skills:
      - dir: ~/.config/nvim/utils/agents/skills/
        ignore:
          - "*-kilic"
          - "*-kilic-*"
          - "*-laravel"
          - "*-laravel-*"
          - notion-*
          - spacelift-*
    env:
      CLAUDE_CODE_OAUTH_TOKEN: "${NVIM_CLAUDE_ACP_KILIC}"

  - id: personal/claude/sonnet
    agent: claude-code
    model: "sonnet[1m]"
    mode: plan
    system_prompt:
      - file: ~/.config/nvim/utils/agents/AGENTS.md
        inject:
          on_create: true
          on_update: true
      - file: ~/.config/nvim/utils/agents/HYPRPILOT.md
        inject:
          on_create: true
          on_update: true
    mcps:
      - file: ~/.config/nvim/utils/mcphub/servers.json
        ignore:
          - "*-kilic"
          - "*-kilic-*"
          - "*-laravel"
          - aws-docs
    skills:
      - dir: ~/.config/nvim/utils/agents/skills/
        ignore:
          - "*-kilic"
          - "*-kilic-*"
          - "*-laravel"
          - "*-laravel-*"
          - notion-*
          - spacelift-*
    env:
      CLAUDE_CODE_OAUTH_TOKEN: "${NVIM_CLAUDE_ACP_KILIC}"

  - id: kilic/kimi2.6
    agent: opencode
    model: kilic/kimi-2.6:cloud
    mode: plan
    system_prompt:
      - file: ~/.config/nvim/utils/agents/AGENTS.md
        inject:
          on_create: true
          on_update: true
      - file: ~/.config/nvim/utils/agents/HYPRPILOT.md
        inject:
          on_create: true
          on_update: true
    mcps:
      - file: ~/.config/nvim/utils/mcphub/servers.json
        ignore:
          - "*-kilic"
          - "*-kilic-*"
          - "*-laravel"
          - aws-docs
    skills:
      - dir: ~/.config/nvim/utils/agents/skills/
        ignore:
          - "*-kilic"
          - "*-kilic-*"
          - "*-laravel"
          - "*-laravel-*"
          - notion-*
          - spacelift-*
    env:
      OPENCODE_CONFIG: $HOME/.config/nvim/utils/agents/opencode/kilic.json
      AI_KILIC_DEV_API_KEY: "${AI_KILIC_DEV_API_KEY}"

  - id: work/claude/opus
    agent: claude-code
    model: "opus[1m]"
    mode: plan
    system_prompt:
      - file: ~/.config/nvim/utils/agents/AGENTS.md
        inject:
          on_create: true
          on_update: true
      - file: ~/.config/nvim/utils/agents/HYPRPILOT.md
        inject:
          on_create: true
          on_update: true
    mcps:
      - file: ~/.config/nvim/utils/mcphub/servers.json
        ignore:
          - "*-kilic"
          - "*-kilic-*"
          - gitlab
          - playwright
    skills:
      - dir: ~/.config/nvim/utils/agents/skills/
        ignore:
          - "*-kilic"
          - "*-kilic-*"
          - gitlab-*
    env:
      CLAUDE_CODE_OAUTH_TOKEN: "${NVIM_CLAUDE_ACP_WORK}"
