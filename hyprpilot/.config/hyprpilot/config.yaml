remote:
  enabled: true

ui:
  zoom: 1.4

daemon:
  window:
    mode: anchor
    anchor:
      edge: right
      margin: 0
      width: 40%

autostart:
  # TODO: fix this later on when installed via aur
  enabled: false

logging:
  level: info

# Root-level [[patches]] — each entry is a partial ProfileConfig
# overlay applied to whichever profile is picked at resolve time.
# Optional `$match.profile` glob filters which profiles a patch
# reaches. Replaces the per-field root fallback shape (system_prompt,
# mcps, mcp.skills) the daemon shipped through 0.x.
patches:
  # Unscoped — every profile inherits the shared cwd, system_prompt
  # and default mcp/skills config. Captain-specific tuning (the
  # personal/* vs work/* mcps split) lives in the scoped patches below.
  - cwd: ~/notes
    system_prompt:
      - file: ~/.config/nvim/utils/agents/AGENTS.md
        inject:
          on_create: true
          on_update: true
      - file: ~/.config/nvim/utils/agents/HYPRPILOT.md
        inject:
          on_create: true
          on_update: true
    mcp:
      enabled: true
      autoAcceptTools: ["*"]
      autoRejectTools: []

  # personal/* + kilic/* profiles share one mcps ignore list.
  - $match:
      profile: "personal/*"
    mcp:
      skills:
        - dir: ~/.config/nvim/utils/agents/skills/
          ignore:
            - "*-laravel"
            - "*-laravel-*"
            - notion-*
            - spacelift-*
    mcps:
      - file: ~/.config/nvim/utils/mcphub/servers.json
        ignore:
          - "*-laravel"
          - aws-docs
          - terraform

  # work/* profiles use a different ignore set (gitlab + playwright
  # excluded; aws-docs allowed).
  - $match:
      profile: "work/*"
    mcp:
      skills:
        - dir: ~/.config/nvim/utils/agents/skills/
          ignore:
            - "*-kilic"
            - gitlab-*
    mcps:
      - file: ~/.config/nvim/utils/mcphub/servers.json
        ignore:
          - "*-kilic"
          - gitlab
          - playwright

  # Direct-spawn-only override for work Claude profiles.
  - $match:
      profile: "work/claude/*"
      spawn: true
    env:
      "$patch": replace

agents:
  - id: codex
    provider: acp-codex
    command: bunx
    args: ["--bun", "-y", "@zed-industries/codex-acp@latest"]
    spawn:
      command: codex
      args: ["--profile", "default"]

profile:
  default: personal/codex/gpt-5.5

profiles:
  - id: personal/claude/opus
    agent: claude-code
    model: "opus[1m]"
    mode: plan
    env:
      CLAUDE_CODE_OAUTH_TOKEN: "${NVIM_CLAUDE_ACP_KILIC}"

  - id: personal/claude/sonnet
    agent: claude-code
    model: "sonnet[1m]"
    mode: plan
    env:
      CLAUDE_CODE_OAUTH_TOKEN: "${NVIM_CLAUDE_ACP_KILIC}"

  - id: personal/kilic/deepseek-v4-pro:cloud
    agent: opencode
    model: kilic/deepseek-v4-pro:cloud
    mode: plan
    env:
      AI_KILIC_DEV_API_KEY: "${AI_KILIC_DEV_API_KEY}"

  - id: personal/kilic/glm-5.2:cloud
    agent: opencode
    model: kilic/glm-5.2:cloud
    mode: plan
    env:
      AI_KILIC_DEV_API_KEY: "${AI_KILIC_DEV_API_KEY}"

  - id: personal/kilic/minimax-m3
    agent: opencode
    model: kilic/minimax-m3:cloud
    mode: plan
    env:
      AI_KILIC_DEV_API_KEY: "${AI_KILIC_DEV_API_KEY}"

  - id: personal/kilic/kimi-k2.7-code:cloud
    agent: opencode
    model: kilic/kimi-k2.7-code:cloud
    mode: plan
    env:
      AI_KILIC_DEV_API_KEY: "${AI_KILIC_DEV_API_KEY}"

  - id: personal/kilic/gemma4:31b-cloud
    agent: opencode
    model: kilic/gemma4:31b-cloud
    mode: plan
    env:
      AI_KILIC_DEV_API_KEY: "${AI_KILIC_DEV_API_KEY}"

  - id: personal/codex/gpt-5.5
    agent: codex
    model: gpt-5.5
    mode: read-only

  - id: personal/codex/gpt-5.3-codex-spark
    agent: codex
    model: gpt-5.3-codex-spark
    mode: read-only

  - id: work/claude/opus
    agent: claude-code
    model: "opus[1m]"
    mode: plan
    env:
      CLAUDE_CODE_OAUTH_TOKEN: "${NVIM_CLAUDE_ACP_WORK}"

  - id: work/claude/sonnet
    agent: claude-code
    model: "sonnet[1m]"
    mode: plan
    env:
      CLAUDE_CODE_OAUTH_TOKEN: "${NVIM_CLAUDE_ACP_WORK}"

  - id: work/claude/haiku
    agent: claude-code
    model: haiku
    mode: plan
    env:
      CLAUDE_CODE_OAUTH_TOKEN: "${NVIM_CLAUDE_ACP_WORK}"
    system_prompt: []
