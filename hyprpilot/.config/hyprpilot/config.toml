[ui]
zoom = 1.4

[daemon.window]
mode = "anchor"

[daemon.window.anchor]
edge = "right"
margin = 0
width = "40%"

[autostart]
# TODO: fix this later on when installed via aur
enabled = false

[logging]
level = "info"

[agent]
default = "claude-code"

[profile]
default = "personal/claude/opus"

# Personal profile: drop kilic + laravel (work) infra wholesale.
# `*-kilic` catches argocd / grafana / slack; `*-kilic-*` catches
# linear-kilic-dev. `*-laravel` catches grafana / linear / spacelift.
# For skills, `*kilic*` covers `kilic-*` prefixed AND `*-kilic`
# suffixed bundles; `*-work` + `*-work-*` cover laravel-day-job
# skills (linear-work, notion-work, slack-work*, spacelift-work).
[[profiles]]
id = "personal/claude/opus"
agent = "claude-code"
model = "opus"
mode = "plan"
system_prompt = ["~/.config/nvim/utils/agents/AGENTS.md"]
mcps = [
  { file = "~/.config/nvim/utils/mcphub/servers.json", ignore = ["*-kilic", "*-kilic-*", "*-laravel"] },
]
skills = [
  { dir = "~/.config/nvim/utils/agents/skills/", ignore = ["*kilic*", "*-work", "*-work-*"] },
]

[profiles.env]
CLAUDE_CODE_OAUTH_TOKEN = "${NVIM_CLAUDE_ACP_KILIC}"

# Work profile: keep laravel infra, drop kilic.dev infra.
# `*-kilic` + `*-kilic-*` for the MCP servers; `*kilic*` for the
# skills (catches the `kilic-cluster-*` / `kilic-argocd-*` bundles
# along with `*-kilic` ones). `kilic-cluster-workload` does NOT
# leak into the work profile via the *-work-* glob — the workload
# suffix stays anchored.
[[profiles]]
id = "work/claude/opus"
agent = "claude-code"
model = "opus"
mode = "plan"
system_prompt = ["~/.config/nvim/utils/agents/AGENTS.md"]
mcps = [
  { file = "~/.config/nvim/utils/mcphub/servers.json", ignore = ["*-kilic", "*-kilic-*"] },
]
skills = [
  { dir = "~/.config/nvim/utils/agents/skills/", ignore = ["*kilic*"] },
]

[profiles.env]
CLAUDE_CODE_OAUTH_TOKEN = "${NVIM_CLAUDE_ACP_WORK}"

# kilic.dev profile: keep kilic infra, drop laravel work infra.
# `*-laravel` covers all three laravel-tagged MCP servers.
# `*-work` + `*-work-*` cover linear-work / notion-work / slack-work*
# / spacelift-work skills WITHOUT touching `kilic-cluster-workload`
# (no `-work` suffix, no `-work-` infix — it's `-workload`).
[[profiles]]
id = "kilic/kimi2.6"
agent = "opencode"
model = "kilic/kimi-2.6:cloud"
mode = "plan"
system_prompt = ["~/.config/nvim/utils/agents/AGENTS.md"]
mcps = [
  { file = "~/.config/nvim/utils/mcphub/servers.json", ignore = ["*-laravel"] },
]
skills = [
  { dir = "~/.config/nvim/utils/agents/skills/", ignore = ["*-work", "*-work-*"] },
]

[profiles.env]
OPENCODE_CONFIG = "$HOME/.config/nvim/utils/agents/opencode/kilic.json"
AI_KILIC_DEV_API_KEY = "${AI_KILIC_DEV_API_KEY}"
