[ui]
zoom = 1.4
cwd = "~/notes"

[daemon.window]
mode = "anchor"

[daemon.window.anchor]
edge = "right"
margin = 0
width = "40%"

[autostart]
# TODO: fix this later on when installed via aur
enabled = false

[logging]
level = "info"

[agent]
default = "claude-code"

[profile]
default = "personal/claude/opus"

# Personal profile: drop kilic + laravel (work) infra wholesale.
# Both MCPs and skills now follow the same suffix convention:
# `*-kilic` catches workspace-level (argocd-kilic, linear-kilic, slack-kilic,
# linear-project-argocd-{system,workload}-kilic); `*-kilic-*` catches
# nested bundles (argocd-kilic-loadbalancer, cluster-kilic-*).
# `*-laravel` catches workspace-level (linear-laravel, notion-laravel,
# slack-laravel, spacelift-laravel); `*-laravel-*` catches the slack
# laravel sub-skills (slack-laravel-compile, slack-laravel-review).
[[profiles]]
id = "personal/claude/opus"
agent = "claude-code"
model = "opus[1m]"
mode = "plan"
system_prompt = [
  "~/.config/nvim/utils/agents/AGENTS.md",
  "~/.config/nvim/utils/agents/HYPRPILOT.md",
]
mcps = [
  { file = "~/.config/nvim/utils/mcphub/servers.json", ignore = [
    "*-kilic",
    "*-kilic-*",
    "*-laravel",
    "aws-docs",
  ] },
]
skills = [
  { dir = "~/.config/nvim/utils/agents/skills/", ignore = [
    "*-kilic",
    "*-kilic-*",
    "*-laravel",
    "*-laravel-*",
    "notion-*",
    "spacelift-*",
  ] },
]

[profiles.env]
CLAUDE_CODE_OAUTH_TOKEN = "${NVIM_CLAUDE_ACP_KILIC}"

# kilic.dev profile: keep kilic infra, drop laravel work infra.
# `*-laravel` covers the workspace-level laravel skills + MCP servers.
# `*-laravel-*` covers the slack-laravel-{compile,review} sub-skills.
# cluster-kilic-workload is unaffected — no `-laravel` suffix or infix.
[[profiles]]
id = "kilic/kimi2.6"
agent = "opencode"
model = "kilic/kimi-2.6:cloud"
mode = "plan"
system_prompt = [
  "~/.config/nvim/utils/agents/AGENTS.md",
  "~/.config/nvim/utils/agents/HYPRPILOT.md",
]
mcps = [
  { file = "~/.config/nvim/utils/mcphub/servers.json", ignore = [
    "*-kilic",
    "*-kilic-*",
    "*-laravel",
    "aws-docs",
  ] },
]
skills = [
  { dir = "~/.config/nvim/utils/agents/skills/", ignore = [
    "*-kilic",
    "*-kilic-*",
    "*-laravel",
    "*-laravel-*",
    "notion-*",
    "spacelift-*",
  ] },
]

[profiles.env]
OPENCODE_CONFIG = "$HOME/.config/nvim/utils/agents/opencode/kilic.json"
AI_KILIC_DEV_API_KEY = "${AI_KILIC_DEV_API_KEY}"

# Work profile: keep laravel infra, drop kilic.dev infra.
# Same `*-kilic` / `*-kilic-*` pair for both MCPs and skills now that
# all kilic-bound names use the suffix convention. cluster-kilic-workload
# stays caught by `*-kilic-*` (the `-kilic-` infix), no leak.
[[profiles]]
id = "work/claude/opus"
agent = "claude-code"
model = "opus[1m]"
mode = "plan"
system_prompt = [
  "~/.config/nvim/utils/agents/AGENTS.md",
  "~/.config/nvim/utils/agents/HYPRPILOT.md",
]
mcps = [
  { file = "~/.config/nvim/utils/mcphub/servers.json", ignore = [
    "*-kilic",
    "*-kilic-*",
    "gitlab",
    "playwright",
  ] },
]
skills = [
  { dir = "~/.config/nvim/utils/agents/skills/", ignore = [
    "*-kilic",
    "*-kilic-*",
    "gitlab-*",
  ] },
]

[profiles.env]
CLAUDE_CODE_OAUTH_TOKEN = "${NVIM_CLAUDE_ACP_WORK}"
